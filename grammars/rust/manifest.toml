language = "rust"
version = "0.24.0"
grammar_dir = "tree-sitter-rust-0.24.0"

[adapter]
wasm_fallback_to_native = true

[adapter.native]
backend_kind = "wasmtime_wasm"
module = "kide.adapters.rust"

[adapter.wasm]
backend_kind = "js_bridge"
module = "kide.adapters.rust"

[queries]
symbol_exists = "queries/symbol_exists.scm"
