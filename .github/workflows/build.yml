name: build

on:
  push:
  pull_request:

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build kite-cli
        run: cargo build --release --target ${{ matrix.target }} -p kite-cli

  vscode-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build kite-cli (dependency for tests)
        run: cargo build -p kite-cli
      - name: Install VS Code dependencies
        working-directory: vscode-kite
        run: npm ci
      - name: Run VS Code Integration Tests
        working-directory: vscode-kite
        run: xvfb-run -a npm test

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WASI sysroot
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld wasi-libc
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Build WASI artifacts
        env:
          CC_wasm32_wasip1: clang
          AR_wasm32_wasip1: ar
          CFLAGS_wasm32_wasip1: -isystem /usr/include/wasm32-wasi
        run: |
          cargo build --release --target wasm32-wasip1 -p kite-cli
          cargo build --release --target wasm32-wasip1 -p kite
